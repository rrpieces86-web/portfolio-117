{% extends 'base.html' %}
{% load static %}
{% block title %}
Contact page
{% endblock title %}

{% block content %}

<section>
    <h1>Contact Me</h1>
    <form id="contactForm" method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <div>
            <button type="submit">Send</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</section>

{% endblock content %}
